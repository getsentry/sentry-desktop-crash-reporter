version: 2
updates:
- package-ecosystem: dotnet-sdk
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directory: "/Sentry.CrashReporter"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directories:
    - "/tests/Sentry.CrashReporter.Tests"
    - "/tests/Sentry.CrashReporter.UITests"
    - "/tests/Sentry.CrashReporter.RuntimeTests"
  schedule:
    interval: weekly
  allow:
    # Dependabot's NuGet updater follows test ProjectReferences into the app.
    # Keep test grouping limited to packages owned by tests/Directory.Packages.props.
    - dependency-name: "coverlet.collector"
    - dependency-name: "AwesomeAssertions"
    - dependency-name: "GitHubActionsTestLogger"
    - dependency-name: "Microsoft.NET.Test.Sdk"
    - dependency-name: "Moq"
    - dependency-name: "MSTest.TestAdapter"
    - dependency-name: "MSTest.TestFramework"
    - dependency-name: "NUnit"
    - dependency-name: "NUnit3TestAdapter"
    - dependency-name: "Uno.UI.RuntimeTests.Engine"
    - dependency-name: "Uno.UITest.Helpers"
    - dependency-name: "WireMock.Net"
    - dependency-name: "Xamarin.UITest"
  commit-message:
    prefix: "test(deps)"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "ci(deps)"
