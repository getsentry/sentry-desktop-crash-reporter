version: 2
updates:
- package-ecosystem: dotnet-sdk
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directory: "/Sentry.CrashReporter"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directories:
    - "/tests/Sentry.CrashReporter.Tests"
    - "/tests/Sentry.CrashReporter.UITests"
    - "/tests/Sentry.CrashReporter.RuntimeTests"
  schedule:
    interval: weekly
  groups:
    tests:
      patterns:
        - "*"
  ignore:
    # The NuGet updater can follow ProjectReferences out of /tests.
    - dependency-name: "Uno.Sdk"
  commit-message:
    prefix: "test(deps)"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "ci(deps)"
