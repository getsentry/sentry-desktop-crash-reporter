version: 2
updates:
- package-ecosystem: dotnet-sdk
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directory: "/Sentry.CrashReporter"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore(deps)"
- package-ecosystem: nuget
  directories:
    - "/Sentry.CrashReporter.Tests"
    - "/Sentry.CrashReporter.UITests"
    - "/Sentry.CrashReporter.RuntimeTests"
  schedule:
    interval: weekly
  groups:
    test-dependencies:
      patterns:
        - "*"
      group-by: dependency-name
  commit-message:
    prefix: "test(deps)"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "ci(deps)"
